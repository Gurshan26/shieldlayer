services:
  - type: web
    name: shieldlayer-api
    env: node
    plan: free
    buildCommand: npm install && npm run build --workspace=server
    startCommand: node server/dist/index.js
    envVars:
      - key: REDIS_URL
        sync: false
      - key: CLIENT_URL
        value: https://shieldlayer-client.onrender.com
      - key: NODE_ENV
        value: production
    healthCheckPath: /health

  - type: static
    name: shieldlayer-client
    buildCommand: npm install && npm run build --workspace=client
    staticPublishPath: client/dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: shieldlayer-api
          property: hostURL
